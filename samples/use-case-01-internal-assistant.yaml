title: "Internal Knowledge Assistant"
use_case_id: "use-case-01-internal-assistant"

status:
  value: "draft"
  allowed_values:
    - draft
    - in_review
    - completed

owner:
  name: "Knowledge Management Team"
  business_function: "Internal Operations"

summary:
  short_description: "An internal AI assistant that helps employees retrieve information from approved internal knowledge sources and draft first-pass answers to routine internal questions."
  intended_purpose: "Support internal staff by improving access to existing internal knowledge and reducing time spent on routine information retrieval."
  outputs:
    - "draft answers"
    - "retrieved knowledge snippets"
    - "suggested summaries"
  output_usage: "Employees use the outputs as decision support or drafting support and are expected to review them before relying on them."

deployment_context:
  environment: "internal tool"
  rollout_stage: "pilot"
  geographies:
    - "single geography"
  intended_users:
    - "employees"
    - "internal support teams"
  affected_persons_or_groups:
    - "employees using the assistant"
    - "internal teams relying on drafted outputs"

data_and_dependencies:
  data_sources:
    - "approved internal documentation"
    - "internal policies and procedures"
    - "knowledge base content"
  personal_data_involved: "unclear"
  sensitive_data_involved: "unclear"
  third_party_dependencies:
    - "foundation model provider"
    - "internal search or retrieval service"

human_oversight:
  human_review_expected: true
  human_can_override_or_ignore_output: true
  oversight_owner: "Knowledge Management Team"

impact_assessment_summary:
  expected_benefits:
    - "faster access to internal information"
    - "reduced time spent on repetitive internal questions"
    - "better consistency in first-pass internal responses"
  potential_harms:
    - "incorrect or outdated information in responses"
    - "overreliance on draft outputs"
    - "insufficiently clear source context"
  known_limitations:
    - "outputs may be incomplete"
    - "retrieved content may not reflect the latest document version"
    - "responses require human review"

preliminary_governance_classification:
  value: "requires_further_review"
  rationale: "The use case appears limited to internal support, but classification should remain preliminary until data sensitivity, dependency risks, and oversight assumptions are reviewed more fully."
  ai_act_preliminary_view_note: "This is a preliminary governance classification only and not a formal legal classification under the EU AI Act."
  escalation_recommended: false

