    notes: "Use case record exists, but supporting evidence should be expanded."
  human_oversight:
    applicable: true
    status: "partially_in_place"
    notes: "Human review is expected before reliance on outputs."
  transparency_and_communication:
    applicable: true
    status: "planned"
    notes: "Users should be reminded that outputs are draft support only."
  data_governance:
    applicable: true
    status: "unclear"
    notes: "Data categories and sensitivity need fuller confirmation."
  technical_robustness_and_reliability:
    applicable: true
    status: "planned"
    notes: "Known limitations should be documented and reviewed."
  security_and_resilience:
    applicable: true
    status: "unclear"
    notes: "Third-party dependency implications should be reviewed."
  monitoring_and_review:
    applicable: true
    status: "planned"
    notes: "Review triggers should be added before broader rollout."

